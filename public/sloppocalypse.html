<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>The AI Sloppocalypse</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 1280;
const H = 720;
canvas.width  = W;
canvas.height = H;

// ── constants ──────────────────────────────────────────────
const GROUND_Y   = H - 90;
const CHAR_H     = 96;   // total rendered height of character
const CHAR_FEET  = GROUND_Y;

// running state
let charX   = W / 2;
let charVX  = 3.5;

// column-based height map for pile physics (faster than checking every PR)
const COLS   = 64;
const COL_W  = W / COLS;
let heightMap; // Y of top of pile per column (lower Y = higher pile)

// ── PR labels ──────────────────────────────────────────────
const PR_LABELS = [
  ['PR #4892', '847 files changed'],
  ['PR #4893', 'ai wrote this'],
  ['PR #4894', 'no tests lol'],
  ['PR #4895', 'pls review urgent'],
  ['PR #4896', 'refactor everything'],
  ['PR #4897', 'LGTM (unread)'],
  ['PR #4898', 'wip do not merge'],
  ['PR #4899', 'fix for the fix'],
  ['PR #4900', 'trust me bro'],
  ['PR #4901', '2,847 additions'],
  ['PR #4902', 'deprecated api ok?'],
  ['PR #4903', 'ship it 🤞'],
  ['PR #4904', 'no idea tbh'],
  ['PR #4905', 'generated by claude'],
];

const PR_BG_COLORS  = ['#7c2d12','#78350f','#3b0764','#0c4a6e','#14532d','#4c0519'];
const PR_TRIM_COLORS = ['#f97316','#fbbf24','#a78bfa','#38bdf8','#4ade80','#f472b6'];

// ── state ──────────────────────────────────────────────────
let fallingPRs  = [];
let landedPRs   = [];
let frame       = 0;
let spawnTimer  = 0;
let spawnRate   = 100;
let score       = 0;
let gameState   = 'playing'; // 'playing' | 'gameover'
let gameOverTimer = 0;
let sweatDrops  = [];

// ── helpers ────────────────────────────────────────────────
function reset() {
  fallingPRs    = [];
  landedPRs     = [];
  frame         = 0;
  spawnTimer    = 0;
  spawnRate     = 100;
  score         = 0;
  gameState     = 'playing';
  gameOverTimer = 0;
  sweatDrops    = [];
  heightMap     = new Array(COLS).fill(GROUND_Y);
  charX         = W / 2;
  charVX        = 3.5;
}

function colsForRect(x, w) {
  const c1 = Math.max(0, Math.floor(x / COL_W));
  const c2 = Math.min(COLS - 1, Math.ceil((x + w) / COL_W));
  return [c1, c2];
}


// ── spawn ──────────────────────────────────────────────────
function spawnPR() {
  const lbl  = PR_LABELS[Math.floor(Math.random() * PR_LABELS.length)];
  const ci   = Math.floor(Math.random() * PR_BG_COLORS.length);
  const prW  = 210 + Math.random() * 80 | 0;
  const prH  = 88;
  const x    = 60 + Math.random() * (W - prW - 120);
  fallingPRs.push({
    x, y: -prH - 20,
    w: prW, h: prH,
    vx: (Math.random() - 0.5) * 2,
    vy: 1.5 + Math.random() * 2.5,
    rot: (Math.random() - 0.5) * 0.25,
    bg: PR_BG_COLORS[ci],
    trim: PR_TRIM_COLORS[ci],
    label: lbl,
  });
  score++;
}

// ── update ─────────────────────────────────────────────────
function update() {
  frame++;
  if (gameState !== 'playing') {
    gameOverTimer++;
    if (gameOverTimer > 220) reset();
    return;
  }

  // Move character
  charX += charVX;
  if (charX > W * 0.8) { charX = W * 0.8; charVX = -Math.abs(charVX); }
  if (charX < W * 0.2) { charX = W * 0.2; charVX =  Math.abs(charVX); }

  // Spawn
  spawnTimer++;
  spawnRate = Math.max(18, 100 - (frame / 90 | 0) * 4);
  if (spawnTimer >= spawnRate) {
    spawnTimer = 0;
    spawnPR();
    // Occasionally spawn 2 at once in late game
    if (spawnRate < 40 && Math.random() < 0.3) spawnPR();
  }


  // Move falling PRs
  for (let i = fallingPRs.length - 1; i >= 0; i--) {
    const pr = fallingPRs[i];
    pr.x += pr.vx;
    pr.y += pr.vy;
    pr.vy += 0.12;

    // Off sides
    if (pr.x + pr.w < -10 || pr.x > W + 10) {
      fallingPRs.splice(i, 1);
      continue;
    }

    // Land on pile?
    const [c1, c2] = colsForRect(pr.x, pr.w);
    let landY = GROUND_Y;
    for (let c = c1; c <= c2; c++) landY = Math.min(landY, heightMap[c]);

    if (pr.y + pr.h >= landY) {
      pr.y = landY - pr.h;
      pr.vx = 0; pr.vy = 0; pr.rot *= 0.5;
      // Update height map
      for (let c = c1; c <= c2; c++) {
        heightMap[c] = Math.min(heightMap[c], pr.y);
      }
      landedPRs.push(pr);
      fallingPRs.splice(i, 1);
    }
  }

  // Cull very old landed PRs (keep last 120 for perf)
  if (landedPRs.length > 120) landedPRs.splice(0, landedPRs.length - 120);

  // Trigger game over at 15 PRs
  if (score >= 15) gameState = 'gameover';
}

// ── draw helpers ───────────────────────────────────────────
function px(text, x, y, size, color, align = 'left', shadow = null) {
  ctx.save();
  ctx.font = `bold ${size}px "Courier New", monospace`;
  ctx.textAlign = align;
  ctx.textBaseline = 'top';
  ctx.imageSmoothingEnabled = false;
  if (shadow) { ctx.shadowColor = shadow; ctx.shadowBlur = 12; }
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawBg() {
  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  sky.addColorStop(0, '#050510');
  sky.addColorStop(1, '#0d0d2a');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Stars (deterministic + twinkling)
  for (let i = 0; i < 100; i++) {
    const sx = (i * 137.5 + 42) % W;
    const sy = (i * 83.3 + 15)  % (GROUND_Y * 0.85);
    const twinkle = Math.sin(frame * 0.04 + i * 1.3) > 0.6;
    ctx.fillStyle = twinkle ? 'rgba(255,255,220,0.9)' : 'rgba(255,255,220,0.3)';
    ctx.fillRect(sx | 0, sy | 0, twinkle ? 2 : 1, twinkle ? 2 : 1);
  }

  // City silhouette (simple pixel buildings)
  ctx.fillStyle = '#0a0a18';
  const buildings = [
    [0, 160, 80, GROUND_Y], [70, 200, 60, GROUND_Y], [120, 120, 100, GROUND_Y],
    [210, 180, 70, GROUND_Y], [270, 100, 90, GROUND_Y], [350, 160, 60, GROUND_Y],
    [W-400, 140, 90, GROUND_Y], [W-320, 190, 60, GROUND_Y], [W-270, 110, 100, GROUND_Y],
    [W-180, 170, 70, GROUND_Y], [W-120, 130, 80, GROUND_Y], [W-50, 200, 60, GROUND_Y],
  ];
  buildings.forEach(([x, y, w, h]) => ctx.fillRect(x, y, w, GROUND_Y - y));

  // Building windows (little lit squares)
  ctx.fillStyle = 'rgba(255,220,100,0.25)';
  buildings.forEach(([bx, by, bw]) => {
    for (let wy = by + 10; wy < GROUND_Y - 10; wy += 18) {
      for (let wx = bx + 6; wx < bx + bw - 6; wx += 14) {
        if (Math.sin(wx * 7.3 + wy * 3.1) > 0.2) ctx.fillRect(wx, wy, 6, 8);
      }
    }
  });

  // Ground
  ctx.fillStyle = '#0f1a0f';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.fillStyle = '#1a2e1a';
  ctx.fillRect(0, GROUND_Y, W, 3);

  // Ground grid (retro floor)
  ctx.strokeStyle = 'rgba(0,255,65,0.07)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, GROUND_Y); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = GROUND_Y; y < H; y += 20) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawPR(pr) {
  ctx.save();
  ctx.translate(pr.x + pr.w / 2, pr.y + pr.h / 2);
  ctx.rotate(pr.rot);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(-pr.w/2 + 5, -pr.h/2 + 5, pr.w, pr.h);

  // Body
  ctx.fillStyle = pr.bg;
  ctx.fillRect(-pr.w/2, -pr.h/2, pr.w, pr.h);

  // Top trim bar
  ctx.fillStyle = pr.trim;
  ctx.fillRect(-pr.w/2, -pr.h/2, pr.w, 12);

  // Merge icon (two circles + arrow, pixel style)
  ctx.fillStyle = pr.trim;
  ctx.fillRect(-pr.w/2 + 10, -pr.h/2 + 22, 8, 8);
  ctx.fillRect(-pr.w/2 + 10, -pr.h/2 + 50, 8, 8);
  ctx.fillRect(-pr.w/2 + 13, -pr.h/2 + 30, 2, 20);

  // Border
  ctx.strokeStyle = `${pr.trim}66`;
  ctx.lineWidth = 2;
  ctx.strokeRect(-pr.w/2, -pr.h/2, pr.w, pr.h);

  // Text
  ctx.font = 'bold 17px "Courier New", monospace';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(pr.label[0], -pr.w/2 + 28, -pr.h/2 + 20);
  ctx.font = 'bold 14px "Courier New", monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillText(pr.label[1], -pr.w/2 + 28, -pr.h/2 + 44);

  ctx.restore();
}

function drawCharacter() {
  const headY = CHAR_FEET - CHAR_H;
  const p = 4;
  // run cycle: 4 frames per step
  const step  = (frame / 4 | 0) % 4;
  // leg offsets for running: front/back leg swing
  const legA  = [0, p, 0, -p][step];   // left leg offset
  const legB  = [0, -p, 0, p][step];   // right leg offset
  // arm swing opposite to legs
  const armA  = -legA;
  const armB  = -legB;
  // body bob
  const bob   = step === 1 || step === 3 ? -p/2 : 0;

  ctx.save();
  // flip horizontally when moving left
  if (charVX < 0) {
    ctx.translate(charX, 0);
    ctx.scale(-1, 1);
    ctx.translate(-charX, 0);
  }

  const cx = charX | 0;
  const by = (headY + bob) | 0;

  // ── head ──
  ctx.fillStyle = '#f4c27a';
  ctx.fillRect(cx - 5*p, by, 10*p, 10*p);

  // hair
  ctx.fillStyle = '#2d1f14';
  ctx.fillRect(cx - 5*p, by,       10*p, 2*p);
  ctx.fillRect(cx - 5*p, by,       2*p,  5*p);
  ctx.fillRect(cx + 3*p, by,       2*p,  5*p);

  // eyes (looking forward — always to the right before flip)
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx - 4*p, by + 3*p, 3*p, 3*p);
  ctx.fillRect(cx + 1*p, by + 3*p, 3*p, 3*p);
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(cx - 2*p, by + 3*p, 2*p, 2*p); // pupils forward
  ctx.fillRect(cx + 2*p, by + 3*p, 2*p, 2*p);

  // eyebrows
  ctx.fillStyle = '#2d1f14';
  ctx.fillRect(cx - 4*p, by + p, 3*p, p);
  ctx.fillRect(cx + 1*p, by + p, 3*p, p);

  // mouth (open while running)
  ctx.fillStyle = '#cc6655';
  ctx.fillRect(cx - 2*p, by + 7*p, 4*p, 2*p);
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(cx - 1*p, by + 8*p, 2*p, p);

  // ── body ──
  const bodyY = by + 10*p;
  ctx.fillStyle = '#3a5fc0';
  ctx.fillRect(cx - 6*p, bodyY, 12*p, 10*p);

  // arms swing
  ctx.fillStyle = '#3a5fc0';
  ctx.fillRect(cx - 8*p, bodyY + p + armA, 2*p, 8*p);
  ctx.fillRect(cx + 6*p, bodyY + p + armB, 2*p, 8*p);

  ctx.fillStyle = '#2a4faa';
  ctx.fillRect(cx - p, bodyY + 2*p, 2*p, 6*p);

  // hands
  ctx.fillStyle = '#f4c27a';
  ctx.fillRect(cx - 9*p, bodyY + 8*p + armA, 3*p, 3*p);
  ctx.fillRect(cx + 6*p, bodyY + 8*p + armB, 3*p, 3*p);

  // ── legs ──
  const legsY = bodyY + 10*p;
  ctx.fillStyle = '#1a1a3a';
  ctx.fillRect(cx - 5*p, legsY + legA, 4*p, 8*p);
  ctx.fillRect(cx + p,   legsY + legB, 4*p, 8*p);

  // shoes
  ctx.fillStyle = '#111';
  ctx.fillRect(cx - 6*p, legsY + 7*p + legA, 5*p, 3*p);
  ctx.fillRect(cx + p,   legsY + 7*p + legB, 5*p, 3*p);

  ctx.restore();
}

function drawHUD() {
  // Top bar background
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, 54);

  // Title
  ctx.save();
  ctx.font = 'bold 28px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#ff4444';
  ctx.shadowBlur = 16;
  ctx.fillStyle = '#ff6b6b';
  ctx.fillText('★  THE AI SLOPPOCALYPSE  ★', W / 2, 27);
  ctx.restore();

  // Left: unreviewed counter
  px(`UNREVIEWED: ${String(score).padStart(4,'0')}`, 24, 10, 18, '#00ff41', 'left', '#00ff41');

  // Right: PR counter
  px(`PR ${score} / 15`, W - 24, 10, 18, '#ffcc00', 'right', '#ffcc00');
}

function drawScanlines() {
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);

  // CRT vignette
  const v = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.85);
  v.addColorStop(0, 'rgba(0,0,0,0)');
  v.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = v;
  ctx.fillRect(0, 0, W, H);
}

function drawGameOver() {
  const a = Math.min(1, gameOverTimer / 40);
  ctx.fillStyle = `rgba(0,0,0,${a * 0.75})`;
  ctx.fillRect(0, 0, W, H);

  if (gameOverTimer < 25) return;

  const flash = (gameOverTimer / 6 | 0) % 2 === 0;

  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (flash) {
    ctx.font = 'bold 88px "Courier New", monospace';
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 50;
    ctx.fillStyle = '#ff2222';
    ctx.fillText('MERGE CONFLICT', W/2, H/2 - 70);
  }

  ctx.font = 'bold 30px "Courier New", monospace';
  ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 12;
  ctx.fillStyle = '#ffcc00';
  ctx.fillText(`${score} pull requests unreviewed`, W/2, H/2 + 20);

  ctx.font = '18px "Courier New", monospace';
  ctx.fillStyle = '#00ff41'; ctx.shadowColor = '#00ff41'; ctx.shadowBlur = 8;
  const dots = '.'.repeat((gameOverTimer / 12 | 0) % 4);
  ctx.fillText(`INSERT COIN TO CONTINUE${dots}`, W/2, H/2 + 80);

  ctx.restore();
}

// ── main loop ──────────────────────────────────────────────
function loop() {
  update();

  ctx.clearRect(0, 0, W, H);
  drawBg();

  // Landed PRs (behind character)
  for (const pr of landedPRs) drawPR(pr);

  // Character
  drawCharacter();

  // Falling PRs (in front)
  for (const pr of fallingPRs) drawPR(pr);

  drawHUD();
  drawScanlines();

  if (gameState === 'gameover') drawGameOver();

  requestAnimationFrame(loop);
}

reset();
loop();
</script>
</body>
</html>
